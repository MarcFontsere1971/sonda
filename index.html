<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projecte Sonda Estratosfèrica</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- React -->
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8;
        }
        .phase-card {
            background-color: white;
            border-radius: 1rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .phase-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .header-gradient {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
        }
    </style>
</head>
<body class="text-gray-800">

    <div id="root"></div>

    <script type="text/babel">
        const App = () => {
            const phases = [
                {
                    title: "Fase 1: Concepció i Planificació",
                    duration: "Aprox. 5 sessions",
                    activities: [
                        {
                            title: "1.1: Presentació i Formació d'Equips",
                            description: "Presentació del repte, visualització de vídeos inspiradors i formació d'equips de treball (4-5 alumnes) amb rols inicials.",
                            materials: "Projector, presentació, vídeos de llançaments.",
                            result: "Equips formats i motivats amb una comprensió general del projecte."
                        },
                        {
                            title: "1.2: Pluja d'Idees i Definició de la Missió",
                            description: "Cada equip investiga i defineix una missió secundària creativa i realista. Es redacta un document formal de la missió (primària i secundària).",
                            materials: "Pissarra, retoladors, accés a internet.",
                            result: "Document de definició de la missió científica i tecnològica per equip."
                        },
                        {
                            title: "1.3: Planificació del Projecte i EDT",
                            description: "Introducció a la gestió de projectes. Creació d'una Estructura de Descomposició del Treball (EDT), pressupost inicial i cronograma (Gantt).",
                            materials: "Plantilles per a EDT i Gantt, fulls de càlcul.",
                            result: "Pla de projecte inicial amb tasques, responsabilitats, cronograma i pressupost."
                        }
                    ]
                },
                {
                    title: "Fase 2: Disseny i Construcció",
                    duration: "Aprox. 12 sessions",
                    activities: [
                        {
                            title: "2.1: Taller d'Electrònica i Programació Bàsica",
                            description: "Sessió pràctica per connectar sensors (BMP280, DHT20) a Arduino/Raspberry Pi, llegir dades i guardar-les en una targeta SD.",
                            materials: "Kits d'Arduino/RPi, sensors, protoboards, cables, mòduls SD.",
                            result: "Prototip funcional que llegeix i emmagatzema dades de la missió primària."
                        },
                        {
                            title: "2.2: Disseny i Construcció de la Càrrega Útil",
                            description: "Disseny i construcció de la caixa de porexpan, folrada amb manta tèrmica per a l'aïllament, i fixació segura de tots els components electrònics.",
                            materials: "Porexpan, cúter, cola tèrmica, cinta adhesiva, manta tèrmica, balança.",
                            result: "Sonda muntada, resistent, aïllada i amb pes controlat."
                        },
                        {
                            title: "2.3: Disseny del Sistema de Recuperació",
                            description: "Càlcul de dimensions i construcció del paracaigudes per a una caiguda segura. Construcció d'un reflector de radar amb cartró i paper d'alumini.",
                            materials: "Tela lleugera, cordill, tisores, cartró, paper d'alumini.",
                            result: "Un paracaigudes funcional i un reflector de radar integrables."
                        },
                        {
                            title: "2.4: Integració de Comunicacions i GPS",
                            description: "Integració del mòdul GPS i el sistema de telemetria (LoRa, APRS). Programació per a l'enviament de paquets de dades a una estació base.",
                            materials: "Mòduls GPS, mòduls de ràdio (emissor/receptor), antenes.",
                            result: "Sistema de comunicacions que transmet i rep dades en temps real."
                        }
                    ]
                },
                {
                    title: "Fase 3: Preparació del Llançament",
                    duration: "Aprox. 7 sessions",
                    activities: [
                        {
                            title: "3.1: Programació Final i Proves Integrals",
                            description: "Finalització del codi de vol integrant la missió secundària. Realització de proves completes: test de fred (congelador) i test de caiguda (desplegament paracaigudes).",
                            materials: "Congelador, lloc elevat per al test de caiguda.",
                            result: "Codi de vol finalitzat i sonda validada en proves de funcionament i resistència."
                        },
                        {
                            title: "3.2: Logística i Permisos",
                            description: "Sessió sobre planificació de vol amb eines online per predir la trajectòria. Familiarització amb la normativa d'AESA i preparació de l'esborrany del NOTAM.",
                            materials: "Ordinadors amb accés a Sondehub, Stratoflights, web d'AESA.",
                            result: "Informe de predicció de vol i esborrany de la sol·licitud de permís."
                        },
                        {
                            title: "3.3: Simulacre de Llançament",
                            description: "Pràctica del procediment de llançament sense heli. Muntatge de la 'cadena de vol' (sonda, paracaigudes, corda) i repàs de les checklists creades.",
                            materials: "Tots els components de la sonda, dinamòmetre, guants.",
                            result: "Equips coordinats i familiaritzats amb el procediment del dia D."
                        }
                    ]
                },
                {
                    title: "Fase 4: Llançament i Monitorització",
                    duration: "1 dia complet",
                    activities: [
                        {
                            title: "4.1: Dia de Llançament",
                            description: "Desplaçament al lloc de llançament, comprovacions finals, inflat del globus amb heli i llançament. Muntatge de l'estació de seguiment a terra.",
                            materials: "Bombona d'heli, reductor de pressió, globus, guants, portàtil per a l'estació base.",
                            result: "Llançament exitós de la sonda estratosfèrica."
                        },
                        {
                            title: "4.2: Seguiment en Temps Real",
                            description: "Durant el vol, els equips monitoritzaran les dades de telemetria, traçant la posició en un mapa i registrant les dades dels sensors.",
                            materials: "Estació base (ordinador amb receptor de ràdio i software).",
                            result: "Un registre complet de les dades de vol rebudes en temps real."
                        }
                    ]
                },
                {
                    title: "Fase 5: Recuperació i Anàlisi de Dades",
                    duration: "Aprox. 7 sessions",
                    activities: [
                        {
                            title: "5.1: Missió de Recuperació",
                            description: "Un cop la sonda aterra, l'equip de recuperació utilitzarà les últimes coordenades GPS per desplaçar-se a la zona i trobar la càpsula.",
                            materials: "Vehicle, GPS portàtil/mòbil, mapes, walkie-talkies.",
                            result: "La càrrega útil recuperada amb èxit."
                        },
                        {
                            title: "5.2: Anàlisi de Dades",
                            description: "Extracció de dades de la targeta SD. Processament i visualització de dades (gràfics de temperatura/pressió vs. altitud) i anàlisi de la missió secundària.",
                            materials: "Ordinadors amb software d'anàlisi (Excel, Sheets, Python).",
                            result: "Gràfics i conclusions científiques basades en les dades recollides."
                        },
                        {
                            title: "5.3: Informe Final i Presentació",
                            description: "Elaboració d'un informe final del projecte i preparació d'una presentació per compartir resultats, reptes i aprenentatges amb la comunitat.",
                            materials: "Software de presentacions (PowerPoint, Google Slides).",
                            result: "Un informe tècnic complet i una presentació oral del projecte."
                        }
                    ]
                }
            ];

            const ActivityCard = ({ activity }) => (
                <div className="bg-gray-50 p-6 rounded-lg border border-gray-200 space-y-4 flex flex-col">
                    <h4 className="font-bold text-lg text-blue-800">{activity.title}</h4>
                    <p className="text-gray-600 flex-grow">{activity.description}</p>
                    <div className="mt-auto">
                        <div className="mb-4">
                            <p className="font-semibold text-gray-700 flex items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 mr-2 text-blue-600 flex-shrink-0">
                                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
                                </svg>
                                Materials:
                            </p>
                            <p className="text-gray-600 ml-7">{activity.materials}</p>
                        </div>
                        <div>
                            <p className="font-semibold text-gray-700 flex items-center">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5 mr-2 text-green-600 flex-shrink-0">
                                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                                    <polyline points="22 4 12 14.01 9 11.01"/>
                                </svg>
                                Resultat Esperat:
                            </p>
                            <p className="text-gray-600 ml-7">{activity.result}</p>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    <header className="header-gradient text-white p-8 text-center rounded-b-3xl shadow-lg">
                        <div className="max-w-4xl mx-auto">
                            <h1 className="text-4xl md:text-5xl font-bold mb-2">Projecte Sonda Estratosfèrica</h1>
                            <p className="text-lg md:text-xl opacity-90">Explorant els Límits de l'Atmosfera</p>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-4 md:p-8">
                        {phases.map((phase, index) => (
                            <section key={index} className="mb-12">
                                <div className="phase-card p-6 md:p-8">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
                                        <h2 className="text-3xl font-bold text-blue-900 mb-2 md:mb-0">{phase.title}</h2>
                                        <span className="bg-blue-100 text-blue-800 text-sm font-medium px-4 py-1 rounded-full">{phase.duration}</span>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {phase.activities.map((activity, actIndex) => (
                                            <ActivityCard key={actIndex} activity={activity} />
                                        ))}
                                    </div>
                                </div>
                            </section>
                        ))}
                    </main>

                    <footer className="bg-gray-800 text-white text-center p-6 mt-12">
                        <p>&copy; 2025 Projecte de Tecnologia. Tots els drets reservats.</p>
                    </footer>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>

</body>
</html>
